name: Deploy site to GitHub Pages

# Publishes the contents of preview/ to GitHub Pages on every push to main.
# GitHub Pages "deploy from a branch" can only serve the repo root or /docs,
# so we use an Actions workflow to publish the preview/ subfolder instead.

on:
  push:
    branches: [main]
    paths:
      - "preview/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload preview/ as the site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
